# fly.toml app configuration file generated for bk-sams-agent-bqdopa on 2026-03-30T14:50:44Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bk-sams-agent-bqdopa'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  idle_timeout = "15m"

[[http_service.checks]]
  grace_period = "120s"
  interval = "15s"
  method = "get"
  path = "/health"
  timeout = "10s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
