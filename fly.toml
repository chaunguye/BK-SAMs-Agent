# fly.toml app configuration file generated for bk-sams-agent-bqdopa on 2026-04-04T11:03:52+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bk-sams-agent-bqdopa'
primary_region = 'ams'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '2m0s'
    method = 'get'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096
